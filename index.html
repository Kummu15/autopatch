<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPatch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e4e4e4; min-height: 100vh; }
  header { border-bottom: 1px solid #1e1e1e; padding: 20px 40px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  header span { font-size: 11px; background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; padding: 2px 8px; border-radius: 20px; }
  .badge-live { background: #0f2a1a; border-color: #1a4a2a; color: #4ade80; }
  main { max-width: 860px; margin: 60px auto; padding: 0 24px; }
  .hero { text-align: center; margin-bottom: 48px; }
  .hero h2 { font-size: 36px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 12px; }
  .hero h2 span { color: #4ade80; }
  .hero p { color: #666; font-size: 15px; }
  .card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
  input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 14px; color: #e4e4e4; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; }
  input:focus, textarea:focus { border-color: #4ade80; }
  textarea { resize: vertical; min-height: 100px; }
  button { width: 100%; padding: 14px; background: #4ade80; color: #000; font-weight: 600; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 8px; }
  button:hover { background: #22c55e; }
  button:active { transform: scale(0.99); }
  button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .metric { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 16px; text-align: center; }
  .metric .val { font-size: 28px; font-weight: 700; color: #4ade80; }
  .metric .lbl { font-size: 11px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #111; border: 1px solid #1e1e1e; border-radius: 8px; margin-bottom: 16px; font-size: 13px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .dot.running { background: #facc15; animation: pulse 1s infinite; }
  .dot.success { background: #4ade80; }
  .dot.failed { background: #f87171; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .diff-container { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 10px; overflow: hidden; }
  .diff-header { padding: 10px 16px; background: #111; border-bottom: 1px solid #1e1e1e; font-size: 12px; color: #555; display: flex; justify-content: space-between; }
  pre { padding: 20px; font-size: 13px; line-height: 1.7; overflow-x: auto; font-family: 'SF Mono', 'Fira Code', monospace; }
  .line-add { color: #4ade80; display: block; }
  .line-remove { color: #f87171; display: block; }
  .line-meta { color: #555; display: block; }
  .line-normal { color: #888; display: block; }
  .hidden { display: none; }
  .steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
  .step { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: #111; border: 1px solid #1e1e1e; color: #555; }
  .step.active { border-color: #4ade80; color: #4ade80; background: #0f2a1a; }
</style>
</head>
<body>
<header>
  <h1>AutoPatch</h1>
  <span>v1.0</span>
  <span class="badge-live">live</span>
</header>
<main>
  <div class="hero">
    <h2>AI agent that <span>patches your code</span></h2>
    <p>Plan → Generate → Eval → Reflect → Retry. Powered by Groq LLM.</p>
  </div>
  <div class="card">
    <label>GitHub Repo URL</label>
    <input id="repo" placeholder="https://github.com/octocat/Hello-World" />
    <label style="margin-top:16px">Issue Description</label>
    <textarea id="issue" placeholder="Describe the bug or issue you want patched..."></textarea>
    <button id="btn" onclick="submitPatch()">Generate Patch</button>
  </div>
  <div id="status-bar" class="status-bar hidden">
    <div class="dot" id="dot"></div>
    <span id="status-text">Waiting...</span>
  </div>
  <div id="metrics" class="metrics hidden">
    <div class="metric"><div class="val" id="m-score">—</div><div class="lbl">Quality Score</div></div>
    <div class="metric"><div class="val" id="m-latency">—</div><div class="lbl">Latency</div></div>
    <div class="metric"><div class="val" id="m-attempts">—</div><div class="lbl">Attempts</div></div>
  </div>
  <div id="diff-wrapper" class="diff-container hidden">
    <div class="diff-header"><span>generated patch</span><span id="model-label"></span></div>
    <pre id="diff"></pre>
  </div>
</main>
<script>
  const API = 'https://autopatch-b6ze.onrender.com';
  let pollTimer = null;

  function setStep(n) {
    for(let i=1;i<=5;i++) document.getElementById('s'+i).classList.remove('active');
    if(n) document.getElementById('s'+n).classList.add('active');
  }

  function renderDiff(text) {
    return text.split('\n').map(line => {
      if(line.startsWith('+') && !line.startsWith('+++')) return `<span class="line-add">${escape(line)}</span>`;
      if(line.startsWith('-') && !line.startsWith('---')) return `<span class="line-remove">${escape(line)}</span>`;
      if(line.startsWith('@@')) return `<span class="line-meta">${escape(line)}</span>`;
      return `<span class="line-normal">${escape(line)}</span>`;
    }).join('');
  }

  function escape(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function submitPatch() {
    const repo_url = document.getElementById('repo').value.trim();
    const issue_text = document.getElementById('issue').value.trim();
    if(!repo_url || !issue_text) return;
    document.getElementById('btn').disabled = true;
    document.getElementById('btn').textContent = 'Running agent...';
    document.getElementById('status-bar').classList.remove('hidden');
    document.getElementById('metrics').classList.add('hidden');
    document.getElementById('diff-wrapper').classList.add('hidden');
    const dot = document.getElementById('dot');
    dot.className = 'dot running';
    document.getElementById('status-text').textContent = 'Submitting to agent...';
    setStep(1);
    try {
      const res = await fetch(`${API}/patch`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_url, issue_text })
      });
      const data = await res.json();
      poll(data.id);
    } catch(e) {
      document.getElementById('status-text').textContent = 'Error connecting to API';
      dot.className = 'dot failed';
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').textContent = 'Generate Patch';
    }
  }

  function poll(id) {
    let step = 1;
    const steps = ['Planning...','Generating patch...','Evaluating...','Reflecting...','Retrying...'];
    pollTimer = setInterval(async () => {
      step = Math.min(step+1, 5);
      setStep(step);
      document.getElementById('status-text').textContent = steps[step-1];
      try {
        const res = await fetch(`${API}/patch/${id}`);
        const data = await res.json();
        if(data.status === 'success' || data.status === 'failed') {
          clearInterval(pollTimer);
          const dot = document.getElementById('dot');
          dot.className = 'dot ' + (data.status === 'success' ? 'success' : 'failed');
          document.getElementById('status-text').textContent = data.status === 'success' ? 'Patch generated successfully' : 'Agent failed';
          setStep(null);
          if(data.eval_metrics) {
            document.getElementById('m-score').textContent = data.eval_metrics.quality_score ?? '—';
            document.getElementById('m-latency').textContent = data.eval_metrics.latency_ms ? data.eval_metrics.latency_ms+'ms' : '—';
            document.getElementById('m-attempts').textContent = data.attempt_number ?? '1';
            document.getElementById('metrics').classList.remove('hidden');
          }
          if(data.generated_diff) {
            const clean = data.generated_diff.replace(/```diff\n?/g,'').replace(/```/g,'').trim();
            document.getElementById('diff').innerHTML = renderDiff(clean);
            document.getElementById('model-label').textContent = data.model_used || '';
            document.getElementById('diff-wrapper').classList.remove('hidden');
          }
          document.getElementById('btn').disabled = false;
          document.getElementById('btn').textContent = 'Generate Patch';
        }
      } catch(e) {}
    }, 2000);
  }
</script>
</body>
</html>
